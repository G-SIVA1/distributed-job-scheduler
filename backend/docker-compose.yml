version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: scheduler_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: job_scheduler

    ports:
      - "5432:5432"

  backend:
    build: .

    container_name: scheduler_api

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - .env